{{ define "content" }}
{{ if .ErrorString }}
{{ template "error" . }}
{{ end }}
{{ end }}

{{ define "feedItem" }}
<article id="feed-{{ .ID }}" class="feed-item">
	<span class="feed-container">
		<a href="{{ .URL }}">{{ .Title }}</a>
		<input type="checkbox"
			hx-post="{{ if .Subscribed }}/feeds/unsubscribe{{ else }}/feeds/subscribe{{ end }}"
			hx-target="#feed-{{ .ID }}" hx-swap="outerHTML" hx-include="closest article" hx-trigger="change"
			{{ if .Subscribed }}checked{{ end }}>
	</span>
</article>
{{ end }}

{{ define "error" }}
<p class="error">{{ .ErrorString }}</p>
{{ end }}
