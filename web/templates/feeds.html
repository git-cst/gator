<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Gator - Feeds</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body>
  {{ template "userSelector" . }}
  <a href="/posts">Posts</a>
  <button onclick="document.getElementById('add-feed-dialog').showModal()">
    Add Feed
  </button>

  <dialog id="add-feed-dialog">
    <form hx-post="/feeds" hx-target="#feed-list" hx-swap="innerHTML"
      hx-on::after-settle="document.getElementById('add-feed-dialog').close()">
      {{ if .CurrUser }}
      <input type="hidden" name="user_id" value="{{ .CurrUser.ID }}" />
      {{ end }}
      <input type="text" name="feed_title" placeholder="Title" />
      <input type="text" name="feed_url" placeholder="URL" />
      <input type="text" name="feed_description" placeholder="Description (optional)" />
      <button type="submit">Add</button>
      <button type="button" onclick="document.getElementById('add-feed-dialog').close()">
        Cancel
      </button>
    </form>
  </dialog>

  <div id="main-content">
    {{ template "feedContent" . }}
  </div>


</body>

</html>

{{ define "feedContent" }}
{{ template "error" . }}
<div id="feed-list-title" class="h1">
  Feeds
</div>
<div id="feed-list">
  {{ range .Feeds }}
  {{ template "feedItem" . }}
  {{ end }}
</div>
{{ template "paginationButtons" . }}
{{ end }}
{{ end }}
</div>
{{ end }}
